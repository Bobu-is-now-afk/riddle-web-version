<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>The Diary of Tom Riddle — 湯姆·里德爾的日記</title>

  <!-- Tailwind (Play CDN) for chrome/UI; the diary surface is hand-styled CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Dancing Script: the same reply hand the reMarkable app uses -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500;600;700&family=Caveat:wght@500;600&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles.css" />
</head>
<body class="antialiased">
  <!-- ═══════════════ The diary page ═══════════════ -->
  <main id="diary" aria-label="Tom Riddle's diary">
    <!-- parchment texture + vignette live in ::before / ::after -->

    <!-- Tom's reply is drawn beneath the writing layer -->
    <canvas id="reply" class="layer"></canvas>

    <!-- The user's handwriting; receives Apple Pencil input -->
    <canvas id="ink" class="layer"></canvas>

    <!-- the quill that traces Tom's reply as it appears -->
    <div id="quill" aria-hidden="true">🪶</div>

    <!-- pulsing ink blot shown while the page "thinks" -->
    <div id="blot" aria-hidden="true"></div>

    <!-- faint guidance, fades out on first stroke -->
    <p id="hint">用 Apple Pencil 在書頁上寫字，然後停筆……<br/><span>Write with your pen, then rest it. The diary will drink your ink.</span></p>

    <!-- settings -->
    <button id="gear" title="Oracle settings" aria-label="Settings">⚙</button>
  </main>

  <!-- ═══════════════ Oracle settings ═══════════════ -->
  <div id="settingsBackdrop" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/50 p-4">
    <div class="w-full max-w-md rounded-2xl bg-[#f5ecd8] p-6 shadow-2xl ring-1 ring-black/10 text-[#3a2f22]">
      <h2 class="mb-1 font-serif text-xl font-semibold">The Oracle</h2>
      <p class="mb-4 text-sm text-[#6b5b45]">連接任何 OpenAI 相容的 Vision 端點。金鑰只存在你的瀏覽器 (localStorage)，不會離開這台裝置。留空則以離線示範模式運作。</p>

      <label class="mb-3 block text-sm">
        <span class="mb-1 block font-medium">API Base URL</span>
        <input id="cfgBase" type="text" placeholder="https://api.openai.com/v1"
               class="w-full rounded-lg border border-[#c8b590] bg-white/70 px-3 py-2 outline-none focus:ring-2 focus:ring-[#8a6d3b]" />
      </label>
      <label class="mb-3 block text-sm">
        <span class="mb-1 block font-medium">API Key</span>
        <input id="cfgKey" type="password" placeholder="sk-…"
               class="w-full rounded-lg border border-[#c8b590] bg-white/70 px-3 py-2 outline-none focus:ring-2 focus:ring-[#8a6d3b]" />
      </label>
      <label class="mb-4 block text-sm">
        <span class="mb-1 block font-medium">Model <span class="text-[#8a7a5f]">(需支援 vision)</span></span>
        <input id="cfgModel" type="text" placeholder="gpt-4o-mini"
               class="w-full rounded-lg border border-[#c8b590] bg-white/70 px-3 py-2 outline-none focus:ring-2 focus:ring-[#8a6d3b]" />
      </label>

      <div class="flex items-center justify-between gap-2">
        <label class="flex items-center gap-2 text-sm select-none">
          <input id="cfgStream" type="checkbox" class="h-4 w-4 accent-[#8a6d3b]" checked />
          串流回覆 (streaming)
        </label>
        <div class="flex gap-2">
          <button id="cfgCancel" class="rounded-lg px-4 py-2 text-sm hover:bg-black/5">取消</button>
          <button id="cfgSave" class="rounded-lg bg-[#5b4a30] px-4 py-2 text-sm font-medium text-[#f5ecd8] hover:bg-[#6d5a3c]">儲存</button>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
